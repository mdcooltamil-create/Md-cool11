<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page - Dhayu Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="max-w-6xl mx-auto p-4 md:p-10">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <div class="order-2 md:order-1">
                <h2 class="text-2xl font-semibold mb-6">தொடர்பு விவரங்கள்</h2>
                
                <form class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">மின்னஞ்சல் அல்லது போன் எண்</label>
                        <input type="text" class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <h2 class="text-2xl font-semibold mt-8 mb-4">டெலிவரி முகவரி</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="முதல் பெயர்" class="p-3 border border-gray-300 rounded-md">
                        <input type="text" placeholder="இனிஷியல் / கடைசி பெயர்" class="p-3 border border-gray-300 rounded-md">
                    </div>

                    <input type="text" placeholder="முகவரி (Address)" class="w-full p-3 border border-gray-300 rounded-md">
                    
                    <div class="grid grid-cols-3 gap-4">
                        <input type="text" placeholder="நகரம்" class="p-3 border border-gray-300 rounded-md">
                        <input type="text" placeholder="மாநிலம்" class="p-3 border border-gray-300 rounded-md">
                        <input type="text" placeholder="பின்கோடு" class="p-3 border border-gray-300 rounded-md">
                    </div>

                    <div class="mt-8">
                        <h2 class="text-2xl font-semibold mb-4">பணம் செலுத்தும் முறை</h2>
                        <div class="border border-gray-300 rounded-md p-4 bg-white">
                            <label class="flex items-center space-x-3 cursor-pointer">
                                <input type="radio" name="payment" checked class="h-4 w-4 text-blue-600">
                                <span>ஆன்லைன் பேமெண்ட் / UPI (Razorpay)</span>
                            </label>
                        </div>
                    </div>

                    <button class="w-full bg-black text-white text-xl font-bold py-4 rounded-md hover:bg-gray-800 transition mt-6">
                        ஆர்டர் செய் (Pay Now)
                    </button>
                </form>
            </div>

            <div class="order-1 md:order-2 bg-gray-100 p-6 rounded-lg h-fit">
                <div class="flex items-center justify-between border-b pb-4 mb-4">
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <img src="https://via.placeholder.com/60" alt="Product" class="rounded-md border">
                            <span class="absolute -top-2 -right-2 bg-gray-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">1</span>
                        </div>
                        <div>
                            <p class="font-medium text-gray-800">உங்களின் தயாரிப்பு பெயர்</p>
                            <p class="text-sm text-gray-500">அளவு: XL</p>
                        </div>
                    </div>
                    <p class="font-semibold">₹1,299.00</p>
                </div>

                <div class="space-y-2 border-b pb-4 mb-4">
                    <div class="flex justify-between text-gray-600">
                        <span>துணைத் தொகை (Subtotal)</span>
                        <span>₹1,299.00</span>
                    </div>
                    <div class="flex justify-between text-gray-600">
                        <span>டெலிவரி கட்டணம்</span>
                        <span class="text-green-600 font-medium">இலவசம்</span>
                    </div>
                </div>

                <div class="flex justify-between text-xl font-bold">
                    <span>மொத்தம் (Total)</span>
                    <span>₹1,299.00</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
